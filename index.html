<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: "AgencyR";
        src: url("./data/fonts/AGENCYR.TTF") format("truetype");
      }
      .font-agency {
        font-family: "AgencyR", sans-serif;
      }
    </style>
  </head>
  <body class="font-agency bg-black h-screen overflow-hidden">
    <a
      id="quizLink"
      href="#"
      class="h-full flex flex-col items-center pt-[22vh] mt-[10vh] md:mt-[2vh]"
    >
      <h2 class="text-[#FFC000] text-md md:text-2xl tracking-widest">
        BildeQuiz om:
      </h2>
      <h1
        id="quizTitle"
        class="text-[#9DC3E7] text-5xl md:text-7xl mt-6 md:mt-7"
      >
        ...
      </h1>
      <img
        src="./data/assets/logo.jpg"
        alt=""
        class="w-[60%] md:w-[30%] mt-auto mb-[53vh] md:mb-[45vh]"
      />
    </a>
    <script>
      fetch("./data/content/content.json")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("quizTitle").textContent =
            data.quizName || "Quiz";
          document.getElementById("quizLink").href =
            "./data/screens/dynamicQuiz.html";
        })
        .catch((err) => console.error("Error loading JSON:", err));
    </script>
    <script>
      const quizLink = document.getElementById("quizLink");

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") {
          // Go to quiz (same as click)
          quizLink.click();
        }

        if (e.key === "ArrowLeft") {
          // optional UX feedback (no navigation)
          quizLink.style.transform = "scale(0.98)";
          setTimeout(() => {
            quizLink.style.transform = "scale(1)";
          }, 120);
        }
      });
    </script>
  </body>
</html>
